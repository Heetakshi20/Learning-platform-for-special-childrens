<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>HelpingHands | Feedback</title>
  <link rel="shortcut icon" href="img/logo1.png" type="image/x-icon">
  <style>
    :root {
      --bg:#f4f4f4;
      --card:#ffffff;
      --accent:#dc2626;
      --muted:#b91c1c;
      --success:#16a34a;
      --radius:12px;
      --maxw:1200px;
    }

    * { box-sizing:border-box;font-family:'Times New Roman', Times, serif; }
    body { margin:0; background:var(--bg); color:#7f1d1d; }

    .app { margin:24px auto; padding:20px; }

    .layout {
      display:grid;
      grid-template-columns:260px 1fr;
      gap:18px;
      align-items:start;
    }

    /* Sidebar */
    .sidebar {
      background:#dc2b2b;
      border-radius:var(--radius);
      padding:18px;
      position:sticky;
      top:0;
      align-self:start;
      height:100vh;
      overflow-y:auto;
    }

    .logo {
      display:flex;align-items:center;justify-content:center;
      margin-bottom:18px;font-size:26px;font-weight:bold;color:white;
    }
    .logo span{color:#7CE04A;}

    .nav a {
      display:flex;align-items:center;gap:10px;
      padding:10px;border-radius:10px;
      color:#fff;text-decoration:none;margin-bottom:6px;
      transition:background .2s;
    }
    .nav a:hover{background:#fee2e2c9;color:black;}
        .nav a.active { background:#fecaca; color:var(--accent); font-weight:bold; }

    
    .main { min-height:80vh; }

    h1,h2{margin:0;color:var(--accent);}
    label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px;}
    
    .card {
      background:var(--card);
      padding:18px;
      border-radius:var(--radius);
      margin-bottom:16px;
    }

    .delete-btn{
      background:#b91c1c;
      color:#fff;
      border:none;
      border-radius:6px;
      padding:5px 10px;
      cursor:pointer;
    }
    .delete-btn:hover{background:#7f1d1d;}

    table {
      width:100%;
      border-collapse:collapse;
      background:var(--card);
      border-radius:12px;
      overflow:hidden;
      margin-top:10px;
    }
    thead th{background:#fee2e2;padding:10px;text-align:left;font-size:13px;color:var(--muted);}
    tbody td{padding:10px;border-top:1px solid #fecaca;}
    tbody tr:hover{background:#fef2f2;}

    .loading {
      text-align: center;
      color: var(--accent);
      padding: 2rem;
      font-size: 1.2rem;
    }

    .error {
      background-color: #f8d7da;
      color: #721c24;
      padding: 1rem;
      border-radius: 5px;
      border: 1px solid #f5c6cb;
      margin-bottom: 1rem;
    }

    @media(max-width:900px){
      .layout{grid-template-columns:1fr;}
      .sidebar{position:relative;height:auto;}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="layout">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="logo">Helping<span>Hands</span></div>
        <nav class="nav">
          <a href="admin.html">📊 Dashboard</a>
          <a href="#students">👦 Students</a>
          <a href="activities.html">🎨 Activities</a>
          <a href="score.html">📊 Assignment Scores</a>
          <a href="feedback.html" class="active">📄 Feedback</a>
          <a href="message.html">✉️ Messages</a>
          <a href="index.html">⚙️ Logout</a>
        </nav>
      </aside>

      <!-- Main Content -->
      <main class="main">
        
        <!-- ✅ Loading State -->
        <div id="loadingContainer" class="loading">⏳ Loading feedbacks...</div>

        <!-- ✅ Error State -->
        <div id="errorContainer"></div>

        <!-- ✅ Feedbacks Table -->
        <div class="card" id="feedbackContent" style="display: none;">
          <h2>All Feedbacks</h2>
          <p style="color: var(--muted); font-size: 13px;">Total: <strong id="feedbackCount">0</strong> feedbacks</p>
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Parent Name</th>
                <th>Child Name</th>
                <th>Contact No</th>
                <th>Feedback</th>
                <th>Date</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="feedback-table">
              <tr><td colspan="7" style="text-align:center; padding: 20px;">No feedbacks yet.</td></tr>
            </tbody>
          </table>
        </div>
      </main>
    </div>
  </div>

  <script>
    let feedbacks = [];

    // ✅ FETCH ALL FEEDBACKS ON PAGE LOAD
    window.addEventListener('DOMContentLoaded', async () => {
      await loadFeedbacks();
    });

    async function loadFeedbacks() {
      try {
        console.log('📍 Loading feedbacks from database...');
        
        const response = await fetch('/api/getAllFeedbacks');
        const data = await response.json();

        console.log('📦 API Response:', data);

        if (!response.ok) {
          throw new Error(data.msg || 'Failed to load feedbacks');
        }

        document.getElementById('loadingContainer').style.display = 'none';
        document.getElementById('feedbackContent').style.display = 'block';

        feedbacks = data.feedbacks || [];
        document.getElementById('feedbackCount').textContent = feedbacks.length;
        renderFeedbacks();

        console.log('✅ Feedbacks loaded:', feedbacks.length);

      } catch (error) {
        console.error('❌ Error:', error);
        document.getElementById('loadingContainer').style.display = 'none';
        document.getElementById('errorContainer').innerHTML = 
          `<div class="error">⚠️ Error: ${error.message}</div>`;
      }
    }

    function renderFeedbacks() {
      const feedbackTable = document.getElementById('feedback-table');
      feedbackTable.innerHTML = '';

      if (feedbacks.length === 0) {
        feedbackTable.innerHTML = '<tr><td colspan="7" style="text-align:center; padding: 20px; color: #b91c1c;">No feedbacks yet.</td></tr>';
        return;
      }

      feedbacks.forEach((f, i) => {
        const date = new Date(f.createdAt).toLocaleDateString('en-IN', {
          day: '2-digit',
          month: 'short',
          year: 'numeric'
        });
        
        feedbackTable.insertAdjacentHTML('beforeend', `
          <tr>
            <td>${i + 1}</td>
            <td>${f.parentName}</td>
            <td>${f.childName}</td>
            <td>${f.contact}</td>
            <td style="max-width: 300px;">${f.message}</td>
            <td>${date}</td>
            <td><button class="delete-btn" onclick="deleteFeedback('${f._id}')">Delete</button></td>
          </tr>
        `);
      });

      console.log('✅ Feedbacks rendered in table');
    }

    // ✅ DELETE FEEDBACK
    window.deleteFeedback = async function(feedbackId) {
      if (!confirm("Are you sure you want to delete this feedback?")) return;

      console.log('🗑️ Deleting feedback:', feedbackId);

      try {
        const response = await fetch(`/api/deleteFeedback/${feedbackId}`, {
          method: 'DELETE'
        });

        const data = await response.json();
        console.log('📦 Delete response:', data);

        if (data.success) {
          console.log('✅ Feedback deleted');
          // Reload feedbacks
          await loadFeedbacks();
        } else {
          alert(data.msg || 'Failed to delete feedback');
        }
      } catch (err) {
        console.error('❌ Error deleting feedback:', err);
        alert('Failed to delete feedback');
      }
    };
  </script>
</body>
</html>
