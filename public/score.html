<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>HelpingHands | Student Scores</title>
  <link rel="shortcut icon" href="img/logo1.png" type="image/x-icon">
  <style>
    :root {
      --bg:#f4f4f4;
      --card:#ffffff;
      --accent:#dc2626;
      --muted:#b91c1c;
      --success:#16a34a;
      --radius:12px;
    }

    * { box-sizing:border-box; font-family:'Times New Roman', Times, serif; }
    body { margin: 0; background: var(--bg); color: #7f1d1d; }

    .app { margin: 24px auto; padding: 20px; }

    .layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 18px;
      align-items: start;
    }

    /* Sidebar Navigation */
    .sidebar {
      background: #dc2b2b;
      border-radius: var(--radius);
      padding: 18px;
      position: sticky;
      top: 0;
      height: 100vh;
    }

    .logo {
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 18px; font-size: 26px; color: white; font-weight: bold;
    }
    .logo span { color: #7CE04A; }

    .nav a {
      display: flex; align-items: center; gap: 10px; padding: 10px;
      border-radius: 10px; color: #ffffff; text-decoration: none;
      margin-bottom: 6px; transition: background 0.2s;
    }
    .nav a:hover { background: #fee2e2c9; color: black; }
    .nav a.active { background:#fecaca; color:var(--accent); font-weight:bold; }

    /* Main Area */
    .main { min-height: 80vh; }

    .card {
      background: var(--card);
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 1px 3px rgba(127,29,29,0.1);
      margin-bottom: 20px;
    }

    h1 { font-size: 24px; margin: 0 0 10px 0; color: var(--accent); }
    .sub-text { font-size: 14px; color: var(--muted); margin-bottom: 20px; }

    /* Table Styling */
    .table-container {
      overflow-x: auto;
      border-radius: 12px;
      background: white;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      background: #fee2e2;
      text-align: left;
      padding: 15px;
      font-size: 13px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    tbody td {
      padding: 15px;
      border-top: 1px solid #fecaca;
      font-size: 15px;
    }

    tbody tr:hover { background: #fff5f5; }

    /* Score Badges */
    .badge {
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
    }
    .badge-success { background: #dcfce7; color: #15803d; }
    .badge-warning { background: #fef9c3; color: #854d0e; }

    .loading-spinner { text-align: center; padding: 50px; font-style: italic; color: var(--muted); }
  </style>
</head>
<body>
  <div class="app">
    <div class="layout">
      <aside class="sidebar">
        <div class="logo">Helping<span>Hands</span></div>
        <nav class="nav">
          <a href="admin.html">📊 Dashboard</a>
          <a href="#students">👦 Students</a>
          <a href="activities.html">🎨 Activities</a>
          <a href="score.html" class="active">📊 Assignment Scores</a>
          <a href="feedback.html">📄 Feedback</a>
          <a href="message.html">✉️ Messages</a>
          <a href="index.html">⚙️ Logout</a>
        </nav>
      </aside>

      <main class="main">
        <div class="card">
          <h1>Student Exam Performance</h1>
          <div class="sub-text">Viewing stored results for all completed evaluations.</div>
          
          <div class="table-container">
            <table id="scores-table">
              <thead>
                <tr>
                  <th>#</th>
                  <th>Student Name</th>
                  <th>Class</th>
                  <th>Obtained Score</th>
                  <th>Total</th>
                  <th>Result Status</th>
                  <th>Date Attempted</th>
                </tr>
              </thead>
              <tbody id="scores-list">
                <tr><td colspan="7" class="loading-spinner">Fetching database records...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script>
    // ✅ DATABASE SYNC LOGIC
    async function fetchExamScores() {
      try {
        console.log("📍 Requesting exam scores from backend...");
        
        // This should point to the API route handling your ExamResult database
        const response = await fetch('/api/getExamResults');
        const data = await response.json();

        const tableBody = document.getElementById('scores-list');

        if (data.success && data.results.length > 0) {
          tableBody.innerHTML = ''; // Clear loading row

          data.results.forEach((res, index) => {
            // Calculate percentage for status badge
            const percentage = (res.score / res.total) * 100;
            const statusClass = percentage >= 50 ? 'badge-success' : 'badge-warning';
            const statusText = percentage >= 50 ? 'Passed' : 'Review Needed';

            // Format the createdAt date
            const dateObj = new Date(res.createdAt);
            const formattedDate = dateObj.toLocaleDateString('en-IN', {
              day: '2-digit',
              month: 'short',
              year: 'numeric',
              hour: '2-digit',
              minute: '2-digit'
            });

            // Inject Row
            const row = `
              <tr>
                <td>${index + 1}</td>
                <td><strong>${res.studentName}</strong></td>
                <td>${res.className}</td>
                <td style="color: var(--accent); font-weight: bold;">${res.score}</td>
                <td>${res.total}</td>
                <td><span class="badge ${statusClass}">${statusText}</span></td>
                <td class="muted" style="font-size: 12px;">${formattedDate}</td>
              </tr>
            `;
            tableBody.insertAdjacentHTML('beforeend', row);
          });
        } else {
          tableBody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding:30px;">No results found in the database.</td></tr>';
        }
      } catch (err) {
        console.error("❌ Error fetching results:", err);
        document.getElementById('scores-list').innerHTML = 
          '<tr><td colspan="7" style="text-align:center; color: red; padding:30px;">⚠️ Connection Error: Could not load data.</td></tr>';
      }
    }

    // Initialize on page load
    window.onload = fetchExamScores;
  </script>
</body>
</html>
