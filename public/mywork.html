<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>HelpingHands | My Work</title>
  <link rel="shortcut icon" href="img/logo1.png" type="image/x-icon">
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --accent: #0D5791;
      --muted: #6b7280;
      --success: #16a34a;
      --danger: #dc2626;
      --radius: 12px;
      font-family: 'Times New Roman', Times, serif;
    }

    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: #0f172a; }

    .app { margin: 24px auto; padding: 20px; }

    /* Layout Structure */
    .layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 18px;
      align-items: start;
    }

    /* Sidebar - Blue Theme */
    .sidebar {
      background: var(--accent);
      border-radius: var(--radius);
      padding: 18px;
      position: sticky;
      top: 20px;
      height: calc(100vh - 40px);
      overflow-y: auto;
    }

    .logo {
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 18px; font-size: 26px; color: white; font-weight: bold;
    }
    .logo span { color: #7CE04A; }

    .nav a {
      display: flex; align-items: center; gap: 10px; padding: 12px;
      border-radius: 10px; color: #fff; text-decoration: none;
      margin-bottom: 6px; transition: background 0.2s;
    }
    .nav a:hover { background: #357dc0; }
    .nav a.active { background: #80adf0; font-weight: bold; }

    /* Main Content */
    .main { min-height: 80vh; }

    .header-flex {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    h1 { color: var(--accent); margin: 0; font-size: 24px; }

    /* Upload Panel */
    .upload-panel {
      background: var(--card);
      padding: 20px;
      border-radius: var(--radius);
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.08);
      margin-bottom: 25px;
      border: 2px dashed #cbd5e1;
      text-align: center;
    }

    input[type="file"] {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #cbd5e1;
      margin-right: 10px;
      background: #f8fafc;
    }

    button {
      background: var(--success);
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.2s;
    }
    button:hover { background: #15803d; }

    /* Gallery Grid */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 20px;
    }

    .card {
      background: var(--card);
      padding: 12px;
      border-radius: var(--radius);
      box-shadow: 0 4px 6px rgba(15, 23, 42, 0.05);
      transition: transform 0.2s;
      border: 1px solid #e2e8f0;
    }
    .card:hover { transform: translateY(-5px); }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 10px;
    }

    .deleteBtn {
      width: 100%;
      background: #fee2e2;
      color: var(--danger);
      border: 1px solid #fecaca;
      padding: 8px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: bold;
    }
    .deleteBtn:hover { background: var(--danger); color: white; }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: var(--muted);
      grid-column: 1 / -1;
    }

    @media(max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { height: auto; position: relative; top: 0; }
    }
  </style>
</head>
<body>

  <div class="app">
    <div class="layout">
      <aside class="sidebar">
        <div class="logo">Helping<span>Hands</span></div>
        <nav class="nav">
          <a href="dashboard.html">🏠 Home</a>
          <a href="learning.html">📝 Notes</a>
          <a href="exam.html">📚 Assignments-Tasks</a>
          <a href="story.html">💡 Stories</a>
          <a href="mentorbooking.html">📅 Mentor Booking</a>
          <a href="mywork.html">🖌️ My Work</a>
          <a href="index.html">⚙️ Logout</a>
        </nav>
      </aside>

      <main class="main">
        <div class="header-flex">
          <h1>My Creative Gallery 🎨</h1>
          <div class="muted small">Your uploaded artwork & projects</div>
        </div>

        <div class="upload-panel">
          <label style="display: block; margin-bottom: 10px; font-weight: bold; color: var(--accent);">
            Upload a new masterpiece
          </label>
          <input type="file" id="imageInput" accept="image/*">
          <button onclick="uploadImage()">✨ Upload Work</button>
        </div>

        <div class="cards" id="workGallery">
          <div class="empty-state">No work uploaded yet. Show us your talent!</div>
        </div>
      </main>
    </div>
  </div>

  <script src="mywork.js"></script>

</body>
</html>
