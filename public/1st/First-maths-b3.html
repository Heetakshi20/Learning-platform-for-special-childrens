<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>B3 - 2-Digit Addition | HelpingHands</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <style>
    /* THEME COLORS: Blue: #0D5791, Green: #A1E231, Purple: #6f42c1 */
    * {margin:0; padding:0; box-sizing:border-box;}
    body {font-family:'Poppins', sans-serif; background:linear-gradient(135deg,#87ceeb 0%,#e0f6ff 100%); min-height:100vh; display:flex; flex-direction:column;}
    
    /* NAVBAR */
    .navbar{display:flex;justify-content:space-between;align-items:center;padding:15px 30px;background:#0D5791;color:white;gap:20px;box-shadow:0 2px 8px rgba(0,0,0,0.15);}
    .logo{font-size:26px;font-weight:bold;white-space:nowrap;}
    .logo span{color:#7CE04A;}
    .nav-links{list-style:none;display:flex;gap:20px;flex:1;justify-content:center;}
    .nav-links a{text-decoration:none;color:white;font-weight:bold;padding:8px 14px;border-radius:5px;transition:.3s;}
    .nav-links a:hover{background:rgba(255,255,255,0.2);}
    .nav-buttons{display:flex;gap:10px;}
    .nav-buttons button{padding:8px 14px;border:none;border-radius:6px;cursor:pointer;font-weight:600;transition:0.3s;}
    .manage-btn{background:white;color:#0D5791;}
    .launch-btn{background:#A1E231;color:black;}

    /* MAIN CONTENT */
    .main-wrapper{flex:1;display:flex;justify-content:center;align-items:center;padding:30px 20px;}
    .container{background:white;border-radius:15px;padding:40px;max-width:600px;width:100%;box-shadow:0 8px 30px rgba(0,0,0,0.12); text-align:center;}
    
    .header{display:flex;align-items:center;gap:10px;margin-bottom:25px;border-bottom:2px solid #6f42c1;padding-bottom:10px; text-align:left;}
    .header-icon{width:50px;height:50px;background:#6f42c1;border-radius:50%;color:white;font-size:1.5rem;display:flex;justify-content:center;align-items:center;}
    h2{color:#6f42c1;font-weight:600;font-size:1.4rem;}
    
    .instruction-text{font-weight:600;font-size:1.5rem;color:#0D5791; margin-bottom:30px;}

    /* VERTICAL MATH DESIGN */
    .math-problem {
      display: inline-block;
      font-family: 'Courier New', monospace;
      font-size: 4rem;
      font-weight: bold;
      color: #4c1d95;
      text-align: right;
      letter-spacing: 15px;
      line-height: 1.2;
      position: relative;
    }
    .math-problem .operator { position: absolute; left: -50px; bottom: 85px; color: #0D5791; }
    .line { border-bottom: 5px solid #0D5791; margin: 10px 0; width: 140%; transform: translateX(-20%); }

    .result-row { display: flex; justify-content: flex-end; gap: 5px; }
    .digit-input {
      width: 70px;
      height: 80px;
      text-align: center;
      font-size: 3.5rem;
      font-weight: bold;
      border: 3px dashed #6f42c1;
      border-radius: 10px;
      color: #6f42c1;
      outline: none;
      font-family: 'Poppins', sans-serif;
    }
    .digit-input:focus { border-style: solid; background: #f3e8ff; }

    .labels { display: flex; justify-content: center; gap: 45px; color: #0D5791; font-weight: bold; margin-bottom: 10px; font-size: 1.1rem; }

    .check-btn { margin-top: 30px; padding: 15px 40px; background: #6f42c1; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1.1rem; width: 100%; }
    .next-btn { margin-top: 15px; padding: 15px 40px; background: #0D5791; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; display: none; font-size: 1.1rem; width: 100%; }

    /* FOOTER - EXACTLY SAME AS "COUNT TO 100" */
    .footer{background:#0a4a82;color:white;padding:40px 20px 15px;margin-top:auto;width:100%;}
    .footer-content{display:grid;grid-template-columns:auto 1fr auto;max-width:1100px;margin:0 auto;gap:50px;align-items:flex-start;}
    .footer-section{display:flex;flex-direction:column;justify-content:flex-start;}
    .footer-logo-section{min-width:120px;align-items:center;}
    .footer-logo{display:flex;justify-content:center;align-items:center;height:100px;width:120px;}
    .footer-logo img{height:90px;width:auto;max-width:140px;object-fit:contain;display:block;}
    .footer-links-section{flex:1;}
    .footer-links{display:grid;grid-template-columns:repeat(3,1fr);gap:50px;}
    .footer-links h4{margin-bottom:15px;font-weight:600;font-size:1rem;color:white;text-transform:capitalize;}
    .footer-links ul{padding:0;margin:0;list-style:none;}
    .footer-links li{margin-bottom:10px;}
    .footer-links a{color:rgba(255,255,255,0.8);text-decoration:none;font-size:0.9rem;transition:.3s;display:inline-block;}
    .footer-links a:hover{color:#f39c12;transform:translateX(5px);}
    .footer-social-section{min-width:80px;align-items:center;}
    .footer-social{display:flex;flex-direction:column;gap:15px;align-items:center;}
    .footer-social a{color:white;font-size:1.8rem;transition:.3s;display:flex;justify-content:center;align-items:center;width:50px;height:50px;background:rgba(255,255,255,0.12);border-radius:50%;border:2px solid rgba(255,255,255,0.2);text-decoration:none;}
    .footer-social a:hover{color:#f39c12;background:rgba(243,156,18,0.15);border-color:#f39c12;transform:translateY(-5px) scale(1.1);}
    .footer-bottom{text-align:center;margin-top:30px;padding-top:20px;border-top:1px solid rgba(255,255,255,0.15);font-size:0.8rem;color:rgba(255,255,255,0.6);}

    @media(max-width:600px){
      .footer-content{grid-template-columns:1fr; text-align:center;}
      .footer-links{grid-template-columns:1fr; gap:20px;}
      .math-problem { font-size: 3rem; }
      .digit-input { width: 50px; height: 60px; font-size: 2.5rem; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="logo">Helping<span>Hands</span></div>
    <ul class="nav-links">
      <li><a href="#">Skills</a></li>
      <li><a href="#">Resources</a></li>
      <li><a href="#">Blog</a></li>
      <li><a href="#">About Us</a></li>
    </ul>
    <div class="nav-buttons">
      <button class="manage-btn">Manage Account</button>
      <button class="launch-btn">Login</button>
    </div>
  </nav>

  <div class="main-wrapper">
    <div class="container">
      <div class="header">
        <div class="header-icon"><i class="fas fa-plus-square"></i></div>
        <h2>B3 - 2-Digit Addition</h2>
      </div>

      <div class="instruction-text">Add the Ones first, then the Tens!</div>

      <div class="labels">
        <span>TENS</span>
        <span>ONES</span>
      </div>

      <div class="math-problem">
        <div id="num1">24</div>
        <div id="num2">13</div>
        <span class="operator">+</span>
        <div class="line"></div>
        <div class="result-row">
          <input type="text" class="digit-input" id="tensAns" maxlength="1" placeholder="?">
          <input type="text" class="digit-input" id="onesAns" maxlength="1" placeholder="?">
        </div>
      </div>

      <button class="check-btn" onclick="checkAnswer()">Check Answer</button>
      <button class="next-btn" id="nextBtn" onclick="newProblem()">Next Problem <i class="fas fa-arrow-right"></i></button>
      <div id="feedback" style="margin-top:20px; font-weight:bold; font-size:1.3rem; min-height:30px;"></div>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-content">
      <div class="footer-section footer-logo-section">
        <div class="footer-logo">
          <img src="logo.png" alt="HelpingHands Logo" />
        </div>
      </div>
      <div class="footer-section footer-links-section">
        <div class="footer-links">
          <div>
            <h4>Products</h4>
            <ul><li><a href="#">Games</a></li><li><a href="#">Activities</a></li></ul>
          </div>
          <div>
            <h4>Resources</h4>
            <ul><li><a href="#">Support</a></li><li><a href="#">Help Center</a></li></ul>
          </div>
          <div>
            <h4>Legal</h4>
            <ul><li><a href="#">Privacy Policy</a></li><li><a href="#">Terms</a></li></ul>
          </div>
        </div>
      </div>
      <div class="footer-section footer-social-section">
        <div class="footer-social">
          <a href="#"><i class="fa-brands fa-facebook"></i></a>
          <a href="#"><i class="fa-brands fa-square-x-twitter"></i></a>
          <a href="#"><i class="fa-brands fa-instagram"></i></a>
          <a href="#"><i class="fa-brands fa-youtube"></i></a>
        </div>
      </div>
    </div>
    <div class="footer-bottom">© 2026 HelpingHands. All rights reserved.</div>
  </footer>

  <script>
    let n1, n2, correctSum;

    function newProblem() {
      // Generate numbers where ones digits sum < 10 (no regrouping for this level)
      let o1 = Math.floor(Math.random() * 5); // 0-4
      let o2 = Math.floor(Math.random() * (10 - o1)); 
      
      let t1 = Math.floor(Math.random() * 4) + 1; // 1-4
      let t2 = Math.floor(Math.random() * 4) + 1; // 1-4

      n1 = (t1 * 10) + o1;
      n2 = (t2 * 10) + o2;
      correctSum = n1 + n2;

      document.getElementById('num1').innerText = n1;
      document.getElementById('num2').innerText = n2;
      document.getElementById('tensAns').value = "";
      document.getElementById('onesAns').value = "";
      document.getElementById('feedback').innerText = "";
      document.getElementById('nextBtn').style.display = "none";
      document.getElementById('tensAns').style.borderColor = "#6f42c1";
      document.getElementById('onesAns').style.borderColor = "#6f42c1";
    }

    function checkAnswer() {
      const tA = document.getElementById('tensAns').value;
      const oA = document.getElementById('onesAns').value;
      const userSum = parseInt(tA + oA);

      if(userSum === correctSum) {
        document.getElementById('feedback').innerText = "🌟 Correct! You are a Math Star!";
        document.getElementById('feedback').style.color = "#28a745";
        document.getElementById('nextBtn').style.display = "block";
      } else {
        document.getElementById('feedback').innerText = "Not quite. Check your addition again!";
        document.getElementById('feedback').style.color = "#dc3545";
      }
    }

    newProblem();
  </script>
</body>
</html>
