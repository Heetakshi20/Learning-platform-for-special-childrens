<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>B1 - Addition Facts to 10 | HelpingHands</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <style>
    /* THEME COLORS: Blue: #0D5791, Green: #A1E231, Purple: #6f42c1 */
    * {margin:0; padding:0; box-sizing:border-box;}
    body {font-family:'Poppins', sans-serif; background:linear-gradient(135deg,#87ceeb 0%,#e0f6ff 100%); min-height:100vh; display:flex; flex-direction:column;}
    
    /* NAVBAR */
    .navbar{display:flex;justify-content:space-between;align-items:center;padding:15px 30px;background:#0D5791;color:white;gap:20px;box-shadow:0 2px 8px rgba(0,0,0,0.15);}
    .logo{font-size:26px;font-weight:bold;white-space:nowrap;}
    .logo span{color:#7CE04A;}
    .nav-links{list-style:none;display:flex;gap:20px;flex:1;justify-content:center;}
    .nav-links a{text-decoration:none;color:white;font-weight:bold;padding:8px 14px;border-radius:5px;transition:.3s;}
    .nav-links a:hover{background:rgba(255,255,255,0.2);}
    .nav-buttons{display:flex;gap:10px;}
    .nav-buttons button{padding:8px 14px;border:none;border-radius:6px;cursor:pointer;font-weight:600;transition:0.3s;}
    .manage-btn{background:white;color:#0D5791;}
    .launch-btn{background:#A1E231;color:black;}

    /* MAIN CONTENT */
    .main-wrapper{flex:1;display:flex;justify-content:center;align-items:center;padding:30px 20px;}
    .container{background:white;border-radius:15px;padding:40px;max-width:900px;width:100%;box-shadow:0 8px 30px rgba(0,0,0,0.12); text-align:center;}
    
    .header{display:flex;align-items:center;gap:10px;margin-bottom:25px;border-bottom:2px solid #6f42c1;padding-bottom:10px; text-align:left;}
    .header-icon{width:50px;height:50px;background:#6f42c1;border-radius:50%;color:white;font-size:1.5rem;display:flex;justify-content:center;align-items:center;}
    h2{color:#6f42c1;font-weight:600;font-size:1.5rem;}
    
    .instruction-text{font-weight:600;font-size:1.8rem;color:#0D5791; margin-bottom:30px;}

    /* ADDITION AREA */
    .math-row { display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 40px; }
    .num-circle { width: 90px; height: 90px; background: #f3e8ff; border: 4px solid #6f42c1; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 3rem; font-weight: 800; color: #4c1d95; }
    .symbol { font-size: 3rem; font-weight: 800; color: #0D5791; }
    
    .answer-input { width: 100px; height: 100px; text-align: center; font-size: 3.5rem; font-weight: 800; border: 4px dashed #6f42c1; border-radius: 15px; color: #6f42c1; outline: none; transition: 0.3s; }
    .answer-input:focus { border-style: solid; background: #fff9db; }

    /* VISUAL AIDS */
    .visual-aids { display: flex; justify-content: center; gap: 50px; margin-bottom: 30px; }
    .item-group { display: flex; gap: 5px; flex-wrap: wrap; max-width: 150px; min-height: 50px; justify-content: center;}
    .item-group i { color: #ff4d4d; font-size: 1.5rem; }

    .check-btn { padding: 15px 40px; background: #6f42c1; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1.2rem; }
    .next-btn { padding: 15px 40px; background: #0D5791; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; display: none; font-size: 1.2rem; }

    /* FOOTER - EXACTLY SAME AS PREVIOUS */
    .footer{background:#0a4a82;color:white;padding:40px 20px 15px;margin-top:auto;width:100%;}
    .footer-content{display:grid;grid-template-columns:auto 1fr auto;max-width:1100px;margin:0 auto;gap:50px;align-items:flex-start;}
    .footer-section{display:flex;flex-direction:column;justify-content:flex-start;}
    .footer-logo-section{min-width:120px;align-items:center;}
    .footer-logo{display:flex;justify-content:center;align-items:center;height:100px;width:120px;}
    .footer-logo img{height:90px;width:auto;max-width:140px;object-fit:contain;display:block;}
    .footer-links-section{flex:1;}
    .footer-links{display:grid;grid-template-columns:repeat(3,1fr);gap:50px;}
    .footer-links h4{margin-bottom:15px;font-weight:600;font-size:1rem;color:white;text-transform:capitalize;}
    .footer-links ul{padding:0;margin:0;list-style:none;}
    .footer-links li{margin-bottom:10px;}
    .footer-links a{color:rgba(255,255,255,0.8);text-decoration:none;font-size:0.9rem;transition:.3s;display:inline-block;}
    .footer-links a:hover{color:#f39c12;transform:translateX(5px);}
    .footer-social-section{min-width:80px;align-items:center;}
    .footer-social{display:flex;flex-direction:column;gap:15px;align-items:center;}
    .footer-social a{color:white;font-size:1.8rem;transition:.3s;display:flex;justify-content:center;align-items:center;width:50px;height:50px;background:rgba(255,255,255,0.12);border-radius:50%;border:2px solid rgba(255,255,255,0.2);text-decoration:none;}
    .footer-social a:hover{color:#f39c12;background:rgba(243,156,18,0.15);border-color:#f39c12;transform:translateY(-5px) scale(1.1);}
    .footer-bottom{text-align:center;margin-top:30px;padding-top:20px;border-top:1px solid rgba(255,255,255,0.15);font-size:0.8rem;color:rgba(255,255,255,0.6);}

    @media(max-width:768px){
      .footer-content{grid-template-columns:1fr; text-align:center;}
      .footer-links{grid-template-columns:1fr; gap:20px;}
      .math-row { gap: 10px; }
      .num-circle { width: 60px; height: 60px; font-size: 1.8rem; }
      .answer-input { width: 70px; height: 70px; font-size: 2rem; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="logo">Helping<span>Hands</span></div>
    <ul class="nav-links">
      <li><a href="#">Skills</a></li>
      <li><a href="#">Resources</a></li>
      <li><a href="#">Blog</a></li>
      <li><a href="#">About Us</a></li>
    </ul>
    <div class="nav-buttons">
      <button class="manage-btn">Manage Account</button>
      <button class="launch-btn">Login</button>
    </div>
  </nav>

  <div class="main-wrapper">
    <div class="container">
      <div class="header">
        <div class="header-icon"><i class="fas fa-plus"></i></div>
        <h2>B1 - Addition Facts (Up to 10)</h2>
      </div>

      <div class="instruction-text">Count the apples and find the sum!</div>

      <div class="visual-aids">
        <div class="item-group" id="groupA"></div>
        <div class="symbol" style="visibility:hidden;">+</div> <div class="item-group" id="groupB"></div>
      </div>

      <div class="math-row">
        <div class="num-circle" id="numA">3</div>
        <div class="symbol">+</div>
        <div class="num-circle" id="numB">2</div>
        <div class="symbol">=</div>
        <input type="number" class="answer-input" id="answerInp" placeholder="?">
      </div>

      <div>
        <button class="check-btn" onclick="checkSum()">Check Answer</button>
        <button class="next-btn" id="nextBtn" onclick="newProblem()">Next Problem <i class="fas fa-arrow-right"></i></button>
      </div>
      <div id="feedback" style="margin-top:20px; font-weight:bold; font-size:1.6rem; min-height:40px;"></div>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-content">
      <div class="footer-section footer-logo-section">
        <div class="footer-logo">
          <img src="logo.png" alt="HelpingHands Logo" />
        </div>
      </div>
      <div class="footer-section footer-links-section">
        <div class="footer-links">
          <div>
            <h4>Products</h4>
            <ul><li><a href="#">Games</a></li><li><a href="#">Activities</a></li></ul>
          </div>
          <div>
            <h4>Resources</h4>
            <ul><li><a href="#">Support</a></li><li><a href="#">Blog</a></li></ul>
          </div>
          <div>
            <h4>Legal</h4>
            <ul><li><a href="#">Privacy Policy</a></li></ul>
          </div>
        </div>
      </div>
      <div class="footer-section footer-social-section">
        <div class="footer-social">
          <a href="#"><i class="fa-brands fa-facebook"></i></a>
          <a href="#"><i class="fa-brands fa-square-x-twitter"></i></a>
          <a href="#"><i class="fa-brands fa-instagram"></i></a>
          <a href="#"><i class="fa-brands fa-youtube"></i></a>
        </div>
      </div>
    </div>
    <div class="footer-bottom">© 2026 HelpingHands. All rights reserved.</div>
  </footer>

  <script>
    let valA, valB, sum;

    function newProblem() {
      // Facts to 10: sum must not exceed 10
      valA = Math.floor(Math.random() * 6); // 0-5
      valB = Math.floor(Math.random() * (11 - valA)); // Ensure sum <= 10
      sum = valA + valB;

      document.getElementById('numA').innerText = valA;
      document.getElementById('numB').innerText = valB;
      document.getElementById('answerInp').value = "";
      document.getElementById('answerInp').style.borderColor = "#6f42c1";
      document.getElementById('feedback').innerText = "";
      document.getElementById('nextBtn').style.display = "none";

      // Render Visual Aids (Apples)
      renderIcons('groupA', valA);
      renderIcons('groupB', valB);
    }

    function renderIcons(elementId, count) {
      const container = document.getElementById(elementId);
      container.innerHTML = "";
      for(let i=0; i<count; i++) {
        const icon = document.createElement('i');
        icon.className = 'fas fa-apple-alt';
        container.appendChild(icon);
      }
    }

    function checkSum() {
      const userAns = parseInt(document.getElementById('answerInp').value);
      if(userAns === sum) {
        document.getElementById('feedback').innerText = "🎉 Way to go! That's correct.";
        document.getElementById('feedback').style.color = "#28a745";
        document.getElementById('answerInp').style.borderColor = "#28a745";
        document.getElementById('nextBtn').style.display = "inline-block";
      } else {
        document.getElementById('feedback').innerText = "Oops! Count the apples again.";
        document.getElementById('feedback').style.color = "#dc3545";
        document.getElementById('answerInp').style.borderColor = "#dc3545";
      }
    }

    newProblem();
  </script>
</body>
</html>
