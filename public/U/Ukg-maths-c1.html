<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>C1 - Subtract with Pictures (Numbers up to 5) | HelpingHands</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <style>
    * {margin:0; padding:0; box-sizing:border-box;}
    body {font-family:'Segoe UI Emoji','Apple Color Emoji','Noto Color Emoji',"Poppins",sans-serif;background:linear-gradient(135deg,#87ceeb 0%,#e0f6ff 100%);min-height:100vh;display:flex;flex-direction:column;}
    
    .navbar{display:flex;justify-content:space-between;align-items:center;padding:15px 30px;background:#0D5791;color:white;gap:20px;box-shadow:0 2px 8px rgba(0,0,0,0.15);}
    .logo{font-size:26px;font-weight:bold;white-space:nowrap;}
    .logo span{color:#7CE04A;}
    .nav-links{list-style:none;display:flex;gap:20px;flex:1;justify-content:center;}
    .nav-links a{text-decoration:none;color:white;font-weight:bold;padding:8px 14px;border-radius:5px;transition:.3s;}
    .nav-links a:hover{background:rgba(255,255,255,0.2);}
    .nav-buttons{display:flex;gap:10px;}
    .nav-buttons button{padding:8px 14px;border:none;border-radius:6px;cursor:pointer;font-weight:600;transition:0.3s;}
    .manage-btn{background:white;color:#0D5791;}
    .manage-btn:hover{transform:translateY(-2px);box-shadow:0 4px 8px rgba(0,0,0,.2);}
    .launch-btn{background:#A1E231;color:black;}
    .launch-btn:hover{background:#8fd31a;transform:translateY(-2px);}
    
    .main-wrapper{flex:1;display:flex;justify-content:center;align-items:center;padding:30px 20px;}
    .container{background:white;border-radius:15px;padding:30px;max-width:950px;width:100%;box-shadow:0 8px 30px rgba(0,0,0,0.12);}
    
    .header{display:flex;align-items:center;gap:10px;margin-bottom:25px;border-bottom:2px solid #6f42c1;padding-bottom:10px;}
    .header-icon{width:50px;height:50px;background:#6f42c1;border-radius:50%;color:white;font-size:1.5rem;display:flex;justify-content:center;align-items:center;}
    h2{color:#6f42c1;font-weight:600;font-size:1.5rem;}
    
    .question-section{display:flex;flex-direction:column;gap:20px;margin-bottom:25px;padding:25px;border-radius:15px;background:#f8f9fa;border:3px dashed #6f42c1;}
    .speaker-btn{width:60px;height:60px;background:linear-gradient(135deg,#6f42c1,#5a32a3);border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.8rem;color:white;transition:all .3s ease;box-shadow:0 6px 20px rgba(111,66,193,0.4);align-self:center;}
    .speaker-btn:hover{transform:translateY(-5px) scale(1.05);box-shadow:0 10px 30px rgba(111,66,193,0.6);}
    
    .subtraction-display{display:flex;flex-direction:column;align-items:center;gap:15px;}
    .start-group{display:flex;align-items:center;justify-content:center;gap:15px;}
    .group-container{display:flex;flex-direction:column;align-items:center;gap:10px;}
    .group-title{font-size:1.6rem;font-weight:600;color:#6f42c1;}
    .objects-grid{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;padding:20px;background:#fff;border-radius:20px;border:3px solid #d6bcfa;box-shadow:0 8px 25px rgba(0,0,0,0.1);}
    .subtract-sign{font-size:4rem;color:#6f42c1;font-weight:700;}
    
    .equation-display{margin-top:20px;text-align:center;}
    .equation{font-size:3rem;font-weight:700;color:#6f42c1;margin-bottom:15px;}
    .instruction-text{font-weight:600;font-size:1.8rem;color:#6f42c1;text-align:center;}
    
    .options-container{background:#f3e8ff;border-radius:20px;padding:35px 25px;margin-bottom:25px;border:3px solid #6f42c1;box-shadow:0 10px 35px rgba(0,0,0,0.15);}
    .options{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:22px;max-width:600px;margin:0 auto;}
    .option-btn{background:linear-gradient(135deg,white,#f8f0fc);border:4px solid #d6bcfa;border-radius:18px;height:130px;font-size:4.5rem;font-weight:700;color:#4c1d95;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:15px;user-select:none;transition:all .3s ease;box-shadow:0 8px 25px rgba(0,0,0,0.12);}
    .option-btn:hover{background:#e9d5ff;border-color:#6f42c1;transform:translateY(-8px) scale(1.05);box-shadow:0 15px 40px rgba(111,66,193,0.4);}
    .option-btn.correct{background:linear-gradient(135deg,#28a745,#20c997);border-color:#218838;color:white;box-shadow:0 15px 40px rgba(40,167,69,0.5);}
    .option-btn.incorrect{background:linear-gradient(135deg,#dc3545,#fd7e14);border-color:#c82333;color:white;box-shadow:0 12px 35px rgba(220,53,69,0.4);}
    
    .submit-section{display:flex;justify-content:center;}
    .submit-btn{background:linear-gradient(135deg,#28a745,#218838);color:white;border:none;border-radius:12px;padding:14px 40px;font-weight:600;font-size:1.2rem;cursor:pointer;transition:all .3s;display:flex;align-items:center;gap:10px;box-shadow:0 4px 15px rgba(40,167,69,0.3);}
    .submit-btn:hover{transform:translateY(-3px);box-shadow:0 8px 25px rgba(40,167,69,0.4);}
    .submit-btn:disabled{background:#94d3a2;cursor:not-allowed;transform:none;box-shadow:none;}
    
    .feedback{margin-top:20px;font-weight:600;font-size:1.4rem;text-align:center;min-height:40px;}
    .feedback.correct{color:#155724;}
    .feedback.incorrect{color:#721c24;}
    .score-box{margin-top:30px;border:3px solid #6f42c1;border-radius:15px;padding:25px;text-align:center;font-weight:700;font-size:1.6rem;color:#6f42c1;background:linear-gradient(135deg,#f3e8ff,#e9d5ff);}
    
    .footer{background:#0a4a82;color:white;padding:40px 20px 15px;margin-top:auto;width:100%;}
    .footer-bottom{text-align:center;margin-top:30px;padding-top:20px;border-top:1px solid rgba(255,255,255,0.15);font-size:0.8rem;color:rgba(255,255,255,0.6);}

    @media(max-width:768px){
      .main-wrapper{padding:20px 10px;}.container{padding:20px;}
      .objects-grid{font-size:2.8rem;}
      .options{grid-template-columns:repeat(2,1fr);gap:18px;}
      .option-btn{height:110px;font-size:3.5rem;}
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="logo">Helping<span>Hands</span></div>
    <ul class="nav-links">
      <li><a href="skills.html">Skills</a></li>
      <li><a href="resources.html">Resources</a></li>
      <li><a href="blog.html">Blog</a></li>
      <li><a href="contact.html">Contact Us</a></li>
      <li><a href="about.html">About Us</a></li>
    </ul>
    <div class="nav-buttons">
      <button class="manage-btn">Manage Account</button>
      <button class="launch-btn">Sign Up / Login</button>
    </div>
  </nav>

  <div class="main-wrapper">
    <div class="container">
      <div class="header">
        <div class="header-icon">➖</div>
        <h2>C1 - Subtract with Pictures (Numbers up to 5)</h2>
      </div>

      <div class="question-section">
        <button class="speaker-btn" id="speakerBtn" title="Hear question">
          <i class="fas fa-volume-up"></i>
        </button>
        
        <div class="subtraction-display" id="subtractionDisplay"></div>
        
        <div class="equation-display" id="equationDisplay"></div>
        <div class="instruction-text" id="instructionText">How many are left?</div>
      </div>

      <div class="options-container">
        <div class="options" id="optionsContainer"></div>
      </div>
      
      <div class="submit-section">
        <button class="submit-btn" id="nextBtn" disabled><i class="fas fa-arrow-right"></i> Next</button>
      </div>
      
      <div id="feedback" class="feedback"></div>
      <div id="scoreBox" class="score-box" style="display:none;"></div>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-bottom">© 2025 HelpingHands. All rights reserved.</div>
  </footer>

  <script>
    const synth = window.speechSynthesis;
    
    const questions = [
      {start: 5, take: 2, obj: '🍎', spoken: 'five apples, take away two'},
      {start: 4, take: 1, obj: '⭐', spoken: 'four stars, take away one'},
      {start: 3, take: 2, obj: '🐟', spoken: 'three fish, take away two'},
      {start: 5, take: 3, obj: '🌻', spoken: 'five sunflowers, take away three'},
      {start: 4, take: 3, obj: '🍌', spoken: 'four bananas, take away three'},
      {start: 2, take: 1, obj: '🎈', spoken: 'two balloons, take away one'},
      {start: 5, take: 1, obj: '🍇', spoken: 'five grapes, take away one'},
      {start: 3, take: 1, obj: '🐢', spoken: 'three turtles, take away one'},
      {start: 4, take: 2, obj: '🍉', spoken: 'four watermelons, take away two'},
      {start: 5, take: 4, obj: '🌟', spoken: 'five stars, take away four'}
    ];
    
    let currentIdx = 0;
    let score = 0;
    let answered = false;
    let gameCompleted = false;
    
    const elements = {
      speakerBtn: document.getElementById('speakerBtn'),
      subtractionDisplay: document.getElementById('subtractionDisplay'),
      equationDisplay: document.getElementById('equationDisplay'),
      instructionText: document.getElementById('instructionText'),
      optionsContainer: document.getElementById('optionsContainer'),
      feedback: document.getElementById('feedback'),
      nextBtn: document.getElementById('nextBtn'),
      scoreBox: document.getElementById('scoreBox')
    };

    function speak(text) {
      synth.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'en-US';
      utterance.pitch = 1.1;
      utterance.rate = 0.8;
      synth.speak(utterance);
    }

    elements.speakerBtn.onclick = () => {
      const q = questions[currentIdx];
      speak(`${q.spoken}. How many are left?`);
    };

    function shuffle(array) {
      return [...array].sort(() => Math.random() - 0.5);
    }

    function loadPictures() {
      const q = questions[currentIdx];
      elements.subtractionDisplay.innerHTML = `
        <div class="start-group">
          <div class="group-container">
            <div class="group-title">${q.start}</div>
            <div class="objects-grid">${q.obj.repeat(q.start)}</div>
          </div>
          <div class="subtract-sign">➖</div>
          <div class="group-container">
            <div class="group-title">${q.take}</div>
            <div class="objects-grid">${q.obj.repeat(q.take)}</div>
          </div>
        </div>
      `;
      elements.equationDisplay.innerHTML = `<div class="equation">${q.start} - ${q.take} = ?</div>`;
    }

    function loadOptions() {
      const q = questions[currentIdx];
      const correct = (q.start - q.take).toString();
      const options = [correct, '1', '2', '3', '4', '5'].filter((v, i, a) => a.indexOf(v) === i);
      const shuffledOptions = shuffle(options).slice(0, 4);
      if(!shuffledOptions.includes(correct)) shuffledOptions[0] = correct;
      
      elements.optionsContainer.innerHTML = '';
      shuffle(shuffledOptions).forEach(num => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerHTML = `<div style="font-size:4.5rem;font-weight:700;">${num}</div>`;
        btn.onclick = () => selectOption(btn, num);
        elements.optionsContainer.appendChild(btn);
      });
    }

    function selectOption(btn, selectedNum) {
      if(answered || gameCompleted) return;
      answered = true;
      elements.nextBtn.disabled = false;
      
      const q = questions[currentIdx];
      const correctAnswer = (q.start - q.take).toString();
      
      document.querySelectorAll('.option-btn').forEach(b => b.onclick = null);
      
      if(selectedNum === correctAnswer) {
        btn.classList.add('correct');
        score++;
        elements.feedback.innerHTML = `✅ Perfect! It's ${selectedNum}! 🎉`;
        elements.feedback.className = 'feedback correct';
        speak(`Correct! It equals ${selectedNum}`);
      } else {
        btn.classList.add('incorrect');
        elements.feedback.innerHTML = `❌ No! ${q.start} - ${q.take} = ${correctAnswer}`;
        elements.feedback.className = 'feedback incorrect';
        speak(`The correct answer is ${correctAnswer}`);
      }
    }

    function loadQuestion() {
      if(gameCompleted) return;
      answered = false;
      elements.nextBtn.disabled = true;
      loadPictures();
      loadOptions();
      elements.feedback.textContent = '';
      elements.feedback.className = 'feedback';
    }

    function nextQuestion() {
      currentIdx++;
      if(currentIdx >= questions.length) {
        gameCompleted = true;
        elements.subtractionDisplay.innerHTML = `<div style="font-size:5rem;color:#28a745;margin:20px;">🏆</div>`;
        elements.equationDisplay.innerHTML = '<div class="equation">Subtraction Master!</div>';
        elements.optionsContainer.innerHTML = '';
        elements.nextBtn.style.display = 'none';
        elements.scoreBox.style.display = 'block';
        elements.scoreBox.innerHTML = `Final Score: <strong>${score}/${questions.length}</strong>`;
        speak("Amazing job! You finished the subtraction lesson.");
        return;
      }
      loadQuestion();
    }

    elements.nextBtn.onclick = nextQuestion;
    loadQuestion();
  </script>
</body>
</html>
