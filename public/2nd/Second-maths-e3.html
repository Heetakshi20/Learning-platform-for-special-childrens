<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>E3- Time to 5 minutes | HelpingHands</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');

        /* THEME COLORS: Blue: #0D5791, Green: #A1E231, Purple: #6f42c1, Orange: #f39c12 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Poppins', sans-serif; 
            background: linear-gradient(135deg, #87ceeb 0%, #e0f6ff 100%); 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
        }

        /* NAVBAR */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: #0D5791;
            color: white;
            gap: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo { font-size: 26px; font-weight: bold; white-space: nowrap; }
        .logo span { color: #7CE04A; }

        .nav-links { list-style: none; display: flex; gap: 20px; flex: 1; justify-content: center; }
        .nav-links a { text-decoration: none; color: white; font-weight: bold; padding: 8px 14px; border-radius: 5px; transition: 0.3s; }
        .nav-links a:hover { background: rgba(255,255,255,0.2); }

        .nav-buttons { display: flex; gap: 10px; align-items: center; }
        .nav-buttons button { padding: 8px 14px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .manage-btn { background: white; color: #0D5791; }
        .launch-btn { background: #A1E231; color: black; }
        
        /* MAIN WRAPPER */
        .main-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            padding: 40px;
            max-width: 850px;
            width: 100%;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
            text-align: center;
            position: relative;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            border-bottom: 2px solid #f39c12;
            padding-bottom: 10px;
            text-align: left;
        }

        .header-icon {
            width: 50px;
            height: 50px;
            background: #f39c12;
            border-radius: 50%;
            color: white;
            font-size: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        h2 { color: #f39c12; font-weight: 600; font-size: 1.4rem; }
        .instruction { font-size: 1.2rem; color: #444; margin-bottom: 30px; }

        /* LAB ZONE - WEIGHT SCALE */
        .lab-zone {
            background: #fdfdfd;
            border: 2px dashed #ccc;
            border-radius: 15px;
            padding: 40px;
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 250px;
        }

        .scale-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .object-on-scale {
            margin-bottom: 10px;
            transition: all 0.4s ease;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }

        .scale-plate {
            width: 200px;
            height: 15px;
            background: #bdc3c7;
            border-radius: 10px;
            margin-bottom: 5px;
        }

        .scale-base {
            width: 160px;
            height: 100px;
            background: #34495e;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .digital-display {
            background: #222;
            border: 3px solid #555;
            width: 120px;
            height: 50px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            color: #00ff00;
            font-size: 1.5rem;
            font-weight: bold;
            box-shadow: inset 0 0 10px #000;
        }

        /* OPTIONS GRID */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .choice-card {
            padding: 15px;
            border: 2px solid #eee;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            background: white;
            font-size: 1.2rem;
            font-weight: bold;
            color: #444;
        }

        .choice-card:hover { border-color: #6f42c1; background: #f8f0ff; }
        .choice-card.selected { border-color: #A1E231; background: #f1fde0; transform: scale(1.05); }

        .check-btn { padding: 15px 40px; background: #f39c12; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1.1rem; width: 100%; margin-top: 25px; transition: 0.2s;}
        .check-btn:hover { background: #e67e22; }
        
        .next-btn { padding: 15px 40px; background: #0D5791; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; display: none; font-size: 1.1rem; width: 100%; margin-top: 10px; transition: 0.2s;}
        .next-btn:hover { background: #0a4a82; }

        #feedback { margin-top: 20px; font-weight: bold; font-size: 1.3rem; min-height: 35px; }

        /* FOOTER */
        .footer{background:#0a4a82;color:white;padding:40px 20px 15px;margin-top:auto;width:100%;}
        .footer-content{display:grid;grid-template-columns:auto 1fr auto;max-width:1100px;margin:0 auto;gap:50px;align-items:flex-start;}
        .footer-section{display:flex;flex-direction:column;justify-content:flex-start;}
        .footer-logo-section{min-width:120px;align-items:center;}
        .footer-logo{display:flex;justify-content:center;align-items:center;height:100px;width:120px;}
        .footer-logo img{height:90px;width:auto;max-width:140px;object-fit:contain;display:block;}
        .footer-links-section{flex:1;}
        .footer-links{display:grid;grid-template-columns:repeat(3,1fr);gap:50px;}
        .footer-links h4{margin-bottom:15px;font-weight:600;font-size:1rem;color:white;text-transform:capitalize;}
        .footer-links ul{padding:0;margin:0;list-style:none;}
        .footer-links li{margin-bottom:10px;}
        .footer-links a{color:rgba(255,255,255,0.8);text-decoration:none;font-size:0.9rem;transition:.3s;display:inline-block;}
        .footer-links a:hover{color:#f39c12;transform:translateX(5px);}
        .footer-social-section{min-width:80px;align-items:center;}
        .footer-social{display:flex;flex-direction:column;gap:15px;align-items:center;}
        .footer-social a{color:white;font-size:1.8rem;transition:.3s;display:flex;justify-content:center;align-items:center;width:50px;height:50px;background:rgba(255,255,255,0.12);border-radius:50%;border:2px solid rgba(255,255,255,0.2);text-decoration:none;}
        .footer-social a:hover{color:#f39c12;background:rgba(243,156,18,0.15);border-color:#f39c12;transform:translateY(-5px) scale(1.1);}
        .footer-bottom{text-align:center;margin-top:30px;padding-top:20px;border-top:1px solid rgba(255,255,255,0.15);font-size:0.8rem;color:rgba(255,255,255,0.6);}
        
        @media (max-width: 768px) {
            .footer-content { grid-template-columns: 1fr; text-align: center; }
            .footer-links { grid-template-columns: 1fr; gap: 20px; }
            .nav-links { display: none; }
            .options-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">Helping<span>Hands</span></div>
        <ul class="nav-links">
            <li><a href="#">Skills</a></li>
            <li><a href="#">Resources</a></li>
            <li><a href="#">Blog</a></li>
            <li><a href="#">About Us</a></li>
        </ul>
        <div class="nav-buttons">
            <button class="manage-btn">Manage Account</button>
            <button class="launch-btn">Login</button>
        </div>
    </nav>

    <div class="main-wrapper">
        <div class="container">
            <div class="header">
                <div class="header-icon"><i class="fas fa-clock"></i></div>
                <h2>E3- Time to 5 minutes</h2>
            </div>

            <p class="instruction" id="questText">How much does the object weigh?</p>

            <div class="lab-zone">
                <div class="scale-container">
                    <div id="game-object" class="object-on-scale">
                        <i class="fas fa-apple-alt fa-4x" style="color: #e74c3c;"></i>
                    </div>
                    <div class="scale-plate"></div>
                    <div class="scale-base">
                        <div class="digital-display" id="weight-display">0.0</div>
                    </div>
                </div>
            </div>

            <div class="options-grid" id="options"></div>

            <button class="check-btn" onclick="checkAnswer()">Check Point</button>
            <button class="next-btn" id="nextBtn" onclick="startNewMission()">Next Mission <i class="fas fa-rocket"></i></button>
            
            <div id="feedback"></div>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-content">
            <div class="footer-section footer-logo-section">
                <div class="footer-logo"><img src="logo.png" alt="Logo" /></div>
            </div>
            <div class="footer-section footer-links-section">
                <div class="footer-links">
                    <div><h4>Products</h4><ul><li><a href="#">Games</a></li><li><a href="#">Activities</a></li></ul></div>
                    <div><h4>Resources</h4><ul><li><a href="#">Support</a></li><li><a href="#">Help Center</a></li></ul></div>
                    <div><h4>Legal</h4><ul><li><a href="#">Privacy Policy</a></li><li><a href="#">Terms</a></li></ul></div>
                </div>
            </div>
            <div class="footer-section footer-social-section">
                <div class="footer-social">
                    <a href="#"><i class="fa-brands fa-facebook"></i></a>
                    <a href="#"><i class="fa-brands fa-square-x-twitter"></i></a>
                    <a href="#"><i class="fa-brands fa-instagram"></i></a>
                    <a href="#"><i class="fa-brands fa-youtube"></i></a>
                </div>
            </div>
        </div>
        <div class="footer-bottom">© 2026 HelpingHands. All rights reserved.</div>
    </footer>

    <script>
        const itemPool = [
            { name: "Apple", icon: "fa-apple-alt", color: "#e74c3c" },
            { name: "Backpack", icon: "fa-backpack", color: "#3498db" },
            { name: "Water Bottle", icon: "fa-bottle-water", color: "#1abc9c" },
            { name: "Hamburger", icon: "fa-burger", color: "#f39c12" },
            { name: "Dumbbell", icon: "fa-dumbbell", color: "#7f8c8d" },
            { name: "Soccer Ball", icon: "fa-soccer-ball", color: "#2c3e50" }
        ];

        let gameData = {
            target: 0,
            unit: "g",
            selection: null,
            level: 0
        };

        function startNewMission() {
            gameData.level++;
            gameData.selection = null;
            
            document.getElementById('feedback').innerText = "";
            document.getElementById('nextBtn').style.display = "none";
            
            gameData.unit = Math.random() > 0.5 ? "g" : "kg";
            
            if (gameData.unit === "g") {
                gameData.target = (Math.floor(Math.random() * 9) + 1) * 100;
            } else {
                gameData.target = Math.floor(Math.random() * 10) + 1;
            }

            const item = itemPool[Math.floor(Math.random() * itemPool.length)];
            const display = document.getElementById('weight-display');
            const visual = document.getElementById('game-object');
            
            visual.innerHTML = `<i class="fas ${item.icon} fa-4x" style="color: ${item.color};"></i>`;
            
            display.innerText = "----";
            setTimeout(() => {
                display.innerText = `${gameData.target} ${gameData.unit}`;
                document.getElementById('questText').innerText = `How much does the ${item.name} weigh on the digital scale?`;
            }, 800);

            renderOptions();
        }

        function renderOptions() {
            const container = document.getElementById('options');
            container.innerHTML = "";

            let options = [gameData.target];
            while (options.length < 4) {
                let d;
                if (gameData.unit === "g") {
                    d = (Math.floor(Math.random() * 10) + 1) * 100;
                } else {
                    d = Math.floor(Math.random() * 12) + 1;
                }
                
                if (!options.includes(d)) options.push(d);
            }
            options.sort((a, b) => a - b);

            options.forEach(val => {
                const card = document.createElement('div');
                card.className = 'choice-card';
                card.innerText = `${val} ${gameData.unit}`;
                card.onclick = () => {
                    document.querySelectorAll('.choice-card').forEach(c => c.classList.remove('selected'));
                    card.classList.add('selected');
                    gameData.selection = val;
                };
                container.appendChild(card);
            });
        }

        function checkAnswer() {
            const feedback = document.getElementById('feedback');
            if (gameData.selection === null) {
                feedback.innerText = "Please choose an option first! 👆";
                feedback.style.color = "#f39c12";
                return;
            }

            if (gameData.selection === gameData.target) {
                feedback.innerText = "🌟 Great job! You read the weight correctly.";
                feedback.style.color = "#28a745";
                document.getElementById('nextBtn').style.display = "block";
            } else {
                feedback.innerText = "❌ Not quite. Check the green numbers on the scale!";
                feedback.style.color = "#dc3545";
            }
        }

        window.onload = () => {
            startNewMission();
        };
    </script>
</body>
</html>
