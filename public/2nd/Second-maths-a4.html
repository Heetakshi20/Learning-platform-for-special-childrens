<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>A4 - Number Patterns | HelpingHands</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <style>
    /* THEME COLORS: Blue: #0D5791, Green: #A1E231, Purple: #6f42c1 */
    * {margin:0; padding:0; box-sizing:border-box;}
    body {font-family:'Poppins', sans-serif; background:linear-gradient(135deg,#87ceeb 0%,#e0f6ff 100%); min-height:100vh; display:flex; flex-direction:column;}
    
    /* NAVBAR - SAME DESIGN */
    .navbar{display:flex;justify-content:space-between;align-items:center;padding:15px 30px;background:#0D5791;color:white;gap:20px;box-shadow:0 2px 8px rgba(0,0,0,0.15);}
    .logo{font-size:26px;font-weight:bold;white-space:nowrap;}
    .logo span{color:#7CE04A;}
    .nav-links{list-style:none;display:flex;gap:20px;flex:1;justify-content:center;}
    .nav-links a{text-decoration:none;color:white;font-weight:bold;padding:8px 14px;border-radius:5px;transition:.3s;}
    .nav-links a:hover{background:rgba(255,255,255,0.2);}
    .nav-buttons{display:flex;gap:10px;}
    .nav-buttons button{padding:8px 14px;border:none;border-radius:6px;cursor:pointer;font-weight:600;transition:0.3s;}
    .manage-btn{background:white;color:#0D5791;}
    .launch-btn{background:#A1E231;color:black;}

    /* MAIN CONTENT */
    .main-wrapper{flex:1;display:flex;justify-content:center;align-items:center;padding:30px 20px;}
    .container{background:white;border-radius:15px;padding:40px;max-width:800px;width:100%;box-shadow:0 8px 30px rgba(0,0,0,0.12); text-align:center;}
    
    .header{display:flex;align-items:center;gap:10px;margin-bottom:25px;border-bottom:2px solid #6f42c1;padding-bottom:10px; text-align:left;}
    .header-icon{width:50px;height:50px;background:#6f42c1;border-radius:50%;color:white;font-size:1.5rem;display:flex;justify-content:center;align-items:center;}
    h2{color:#6f42c1;font-weight:600;font-size:1.4rem;}

    .question-box { font-size: 1.5rem; color: #0D5791; font-weight: 600; margin-bottom: 25px; }

    /* PATTERN DISPLAY */
    .pattern-display { display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; }
    .number-tile { width: 70px; height: 70px; background: #f0f7ff; border: 3px solid #0D5791; border-radius: 12px; display: flex; justify-content: center; align-items: center; font-size: 1.8rem; font-weight: bold; color: #0D5791; }
    .missing-tile { border: 3px dashed #6f42c1; background: #fff; color: #6f42c1; font-size: 2rem; }

    .options-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 25px; }
    .choice-card { 
        padding: 15px; border: 2px solid #eee; border-radius: 10px; cursor: pointer; 
        font-weight: bold; font-size: 1.5rem; color: #0D5791; background: white; transition: 0.3s;
    }
    .choice-card:hover { border-color: #6f42c1; background: #f0f4f8; }
    .choice-card.selected { border-color: #A1E231; background: #f1fde0; }

    .check-btn { padding: 15px 40px; background: #6f42c1; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1.1rem; width: 100%; }
    .next-btn { padding: 15px 40px; background: #0D5791; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; display: none; font-size: 1.1rem; width: 100%; margin-top: 10px;}

    /* FOOTER - EXACT SAME (auto 1fr auto) */
    .footer{background:#0a4a82;color:white;padding:40px 20px 15px;margin-top:auto;width:100%;}
    .footer-content{display:grid;grid-template-columns:auto 1fr auto;max-width:1100px;margin:0 auto;gap:50px;align-items:flex-start;}
    .footer-section{display:flex;flex-direction:column;justify-content:flex-start;}
    .footer-logo-section{min-width:120px;align-items:center;}
    .footer-logo{display:flex;justify-content:center;align-items:center;height:100px;width:120px;}
    .footer-logo img{height:90px;width:auto;max-width:140px;object-fit:contain;display:block;}
    .footer-links-section{flex:1;}
    .footer-links{display:grid;grid-template-columns:repeat(3,1fr);gap:50px;}
    .footer-links h4{margin-bottom:15px;font-weight:600;font-size:1rem;color:white;text-transform:capitalize;}
    .footer-links ul{padding:0;margin:0;list-style:none;}
    .footer-links li{margin-bottom:10px;}
    .footer-links a{color:rgba(255,255,255,0.8);text-decoration:none;font-size:0.9rem;transition:.3s;display:inline-block;}
    .footer-links a:hover{color:#f39c12;transform:translateX(5px);}
    .footer-social-section{min-width:80px;align-items:center;}
    .footer-social{display:flex;flex-direction:column;gap:15px;align-items:center;}
    .footer-social a{color:white;font-size:1.8rem;transition:.3s;display:flex;justify-content:center;align-items:center;width:50px;height:50px;background:rgba(255,255,255,0.12);border-radius:50%;border:2px solid rgba(255,255,255,0.2);text-decoration:none;}
    .footer-social a:hover{color:#f39c12;background:rgba(243,156,18,0.15);border-color:#f39c12;transform:translateY(-5px) scale(1.1);}
    .footer-bottom{text-align:center;margin-top:30px;padding-top:20px;border-top:1px solid rgba(255,255,255,0.15);font-size:0.8rem;color:rgba(255,255,255,0.6);}
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="logo">Helping<span>Hands</span></div>
    <ul class="nav-links">
      <li><a href="#">Skills</a></li><li><a href="#">Resources</a></li><li><a href="#">Blog</a></li><li><a href="#">About Us</a></li>
    </ul>
    <div class="nav-buttons">
      <button class="manage-btn">Manage Account</button><button class="launch-btn">Login</button>
    </div>
  </nav>

  <div class="main-wrapper">
    <div class="container">
      <div class="header">
        <div class="header-icon"><i class="fas fa-chart-line"></i></div>
        <h2>A4 - Number Patterns</h2>
      </div>

      <div class="question-box" id="questionText">Find the missing number in the pattern!</div>
      
      <div class="pattern-display" id="patternArea">
        </div>

      <div class="options-grid" id="options"></div>

      <button class="check-btn" onclick="checkAnswer()">Verify Pattern</button>
      <button class="next-btn" id="nextBtn" onclick="newChallenge()">Next Pattern <i class="fas fa-arrow-right"></i></button>
      <div id="feedback" style="margin-top:20px; font-weight:bold; font-size:1.4rem; min-height:35px;"></div>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-content">
      <div class="footer-section footer-logo-section">
        <div class="footer-logo"><img src="logo.png" alt="Logo" /></div>
      </div>
      <div class="footer-section footer-links-section">
        <div class="footer-links">
          <div><h4>Products</h4><ul><li><a href="#">Games</a></li><li><a href="#">Activities</a></li></ul></div>
          <div><h4>Resources</h4><ul><li><a href="#">Support</a></li><li><a href="#">Help Center</a></li></ul></div>
          <div><h4>Legal</h4><ul><li><a href="#">Privacy Policy</a></li><li><a href="#">Terms</a></li></ul></div>
        </div>
      </div>
      <div class="footer-section footer-social-section">
        <div class="footer-social">
          <a href="#"><i class="fa-brands fa-facebook"></i></a>
          <a href="#"><i class="fa-brands fa-square-x-twitter"></i></a>
          <a href="#"><i class="fa-brands fa-instagram"></i></a>
          <a href="#"><i class="fa-brands fa-youtube"></i></a>
        </div>
      </div>
    </div>
    <div class="footer-bottom">© 2026 HelpingHands. All rights reserved.</div>
  </footer>

  <script>
    let correctNum = 0;
    let userSelection = null;

    function newChallenge() {
      userSelection = null;
      document.getElementById('feedback').innerText = "";
      document.getElementById('nextBtn').style.display = "none";
      
      const steps = [2, 3, 5, 10];
      const step = steps[Math.floor(Math.random() * steps.length)];
      const start = Math.floor(Math.random() * 20) + 1;
      const missingIndex = Math.floor(Math.random() * 4); // 0 to 3
      
      const pattern = [];
      for(let i=0; i<4; i++) {
        pattern.push(start + (i * step));
      }
      
      correctNum = pattern[missingIndex];
      
      const patternArea = document.getElementById('patternArea');
      patternArea.innerHTML = "";
      
      pattern.forEach((num, idx) => {
        const tile = document.createElement('div');
        if(idx === missingIndex) {
            tile.className = "number-tile missing-tile";
            tile.innerText = "?";
        } else {
            tile.className = "number-tile";
            tile.innerText = num;
        }
        patternArea.appendChild(tile);
      });

      // Options
      const optionsArea = document.getElementById('options');
      optionsArea.innerHTML = "";
      let choices = [correctNum];
      while(choices.length < 4) {
        let r = correctNum + (Math.random() > 0.5 ? step : -step) * (Math.floor(Math.random()*2)+1);
        if(!choices.includes(r) && r > 0) choices.push(r);
      }
      choices.sort((a, b) => a - b);

      choices.forEach(c => {
        const btn = document.createElement('div');
        btn.className = "choice-card";
        btn.innerText = c;
        btn.onclick = () => {
          document.querySelectorAll('.choice-card').forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
          userSelection = c;
        };
        optionsArea.appendChild(btn);
      });
    }

    function checkAnswer() {
      if(userSelection === null) return;
      if(userSelection === correctNum) {
        document.getElementById('feedback').innerText = "🌟 Fantastic! You cracked the code.";
        document.getElementById('feedback').style.color = "#28a745";
        document.getElementById('nextBtn').style.display = "block";
        document.querySelector('.missing-tile').innerText = correctNum;
      } else {
        document.getElementById('feedback').innerText = "❌ Not quite. Look at the jump between numbers!";
        document.getElementById('feedback').style.color = "#dc3545";
      }
    }

    newChallenge();
  </script>
</body>
</html>
