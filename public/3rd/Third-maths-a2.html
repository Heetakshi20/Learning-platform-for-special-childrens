<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A2- Multiplication Lab | HelpingHands</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');

        /* THEME COLORS: Blue: #0D5791, Green: #A1E231, Purple: #6f42c1, Orange: #f39c12 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Poppins', sans-serif; 
            background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%); 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow-x: hidden;
        }

        /* NAVBAR */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: #0D5791;
            color: white;
            gap: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo { font-size: 26px; font-weight: bold; white-space: nowrap; }
        .logo span { color: #7CE04A; }

        .nav-links { list-style: none; display: flex; gap: 20px; flex: 1; justify-content: center; }
        .nav-links a { text-decoration: none; color: white; font-weight: bold; padding: 8px 14px; border-radius: 5px; transition: 0.3s; }
        .nav-links a:hover { background: rgba(255,255,255,0.2); }

        .nav-buttons { display: flex; gap: 10px; align-items: center; }
        .nav-buttons button { padding: 8px 14px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .manage-btn { background: white; color: #0D5791; }
        .launch-btn { background: #A1E231; color: black; }
        
        /* MAIN WRAPPER */
        .main-wrapper {
            flex: 1 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            padding: 40px;
            max-width: 850px;
            width: 100%;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
            text-align: center;
            position: relative;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            border-bottom: 2px solid #f39c12;
            padding-bottom: 10px;
            text-align: left;
        }

        .header-icon {
            width: 50px;
            height: 50px;
            background: #f39c12;
            border-radius: 50%;
            color: white;
            font-size: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        h2 { color: #f39c12; font-weight: 600; font-size: 1.4rem; }
        .instruction { font-size: 1.5rem; color: #333; margin-bottom: 30px; font-weight: bold;}

        /* MULTIPLICATION GRID ZONE */
        .math-zone {
            background: #fdfdfd;
            border: 2px solid #e2e8f0;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 320px;
        }

        .multiplication-display {
            font-size: 3.5rem;
            font-weight: 700;
            color: #0D5791;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .array-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            padding: 15px;
            background: #f8fafc;
            border-radius: 8px;
            max-width: 100%;
        }

        .ten-block {
            width: 30px;
            height: 80px;
            background: #A1E231;
            border: 2px solid #7cb320;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            padding: 2px;
        }

        .ten-block-segment {
            height: 6px;
            background: rgba(0,0,0,0.1);
            width: 100%;
            border-radius: 1px;
        }

        /* OPTIONS GRID */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .choice-card {
            padding: 15px;
            border: 2px solid #eee;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            background: white;
            font-size: 1.4rem;
            font-weight: bold;
            color: #444;
        }

        .choice-card:hover { border-color: #0D5791; background: #f0f7ff; }
        .choice-card.selected { border-color: #A1E231; background: #f1fde0; transform: scale(1.05); }

        .check-btn { padding: 15px 40px; background: #0D5791; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1.1rem; width: 100%; margin-top: 25px; transition: 0.2s;}
        .check-btn:hover { background: #0a4a82; }
        
        .next-btn { padding: 15px 40px; background: #A1E231; color: black; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; display: none; font-size: 1.1rem; width: 100%; margin-top: 10px; transition: 0.2s;}
        .next-btn:hover { background: #8ecb2a; }

        #feedback { margin-top: 20px; font-weight: bold; font-size: 1.3rem; min-height: 35px; }

        /* FOOTER STYLES */
        .footer {
            background: #0a4a82;
            color: white;
            padding: 40px 20px 15px;
            margin-top: auto;
            width: 100%;
        }
        .footer-content {
            display: grid;
            grid-template-columns: auto 1fr auto;
            max-width: 1100px;
            margin: 0 auto;
            gap: 50px;
            align-items: flex-start;
        }
        .footer-section {
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }
        .footer-logo-section {
            min-width: 120px;
            align-items: center;
        }
        .footer-logo {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100px;
            width: 120px;
        }
        .footer-logo img {
            height: 90px;
            width: auto;
            max-width: 140px;
            object-fit: contain;
            display: block;
        }
        .footer-links-section {
            flex: 1;
        }
        .footer-links {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 50px;
        }
        .footer-links h4 {
            margin-bottom: 15px;
            font-weight: 600;
            font-size: 1rem;
            color: white;
            text-transform: capitalize;
        }
        .footer-links ul {
            padding: 0;
            margin: 0;
            list-style: none;
        }
        .footer-links li {
            margin-bottom: 10px;
        }
        .footer-links a {
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            font-size: 0.9rem;
            transition: .3s;
            display: inline-block;
        }
        .footer-links a:hover {
            color: #A1E231;
            transform: translateX(5px);
        }
        .footer-social-section {
            min-width: 80px;
            align-items: center;
        }
        .footer-social {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }
        .footer-social a {
            color: white;
            font-size: 1.8rem;
            transition: .3s;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.12);
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.2);
            text-decoration: none;
        }
        .footer-social a:hover {
            color: #A1E231;
            background: rgba(161, 226, 49, 0.15);
            border-color: #A1E231;
            transform: translateY(-5px) scale(1.1);
        }
        .footer-bottom {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.15);
            font-size: 0.8rem;
            color: rgba(255,255,255,0.6);
        }
        
        @media (max-width: 768px) {
            .options-grid { grid-template-columns: 1fr 1fr; }
            .nav-links { display: none; }
            .footer-content {
                grid-template-columns: 1fr;
                text-align: center;
                gap: 30px;
            }
            .footer-links {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            .footer-social {
                flex-direction: row;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">Helping<span>Hands</span></div>
        <ul class="nav-links">
            <li><a href="#">Skills</a></li>
            <li><a href="#">Resources</a></li>
            <li><a href="#">Blog</a></li>
            <li><a href="#">About Us</a></li>
        </ul>
        <div class="nav-buttons">
            <button class="manage-btn">Manage Account</button>
            <button class="launch-btn">Login</button>
        </div>
    </nav>

    <div class="main-wrapper">
        <div class="container">
            <div class="header">
                <div class="header-icon"><i class="fas fa-calculator"></i></div>
                <h2>A2- Multiplication Lab: Multiples of 10</h2>
            </div>

            <p class="instruction">Multiply by the power of 10!</p>

            <div class="math-zone">
                <div class="multiplication-display" id="problemText">
                    ? × ? =
                </div>
                <div id="arrayViz" class="array-container">
                    <!-- Blocks representing 10s generated here -->
                </div>
            </div>

            <div class="options-grid" id="options"></div>

            <button class="check-btn" onclick="checkAnswer()">Submit Answer</button>
            <button class="next-btn" id="nextBtn" onclick="startNewMission()">Next Problem <i class="fas fa-arrow-right"></i></button>
            
            <div id="feedback"></div>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-content">
            <div class="footer-section footer-logo-section">
                <div class="footer-logo"><img src="logo.png" alt="Logo" /></div>
            </div>
            <div class="footer-section footer-links-section">
                <div class="footer-links">
                    <div>
                        <h4>Products</h4>
                        <ul>
                            <li><a href="#">Games</a></li>
                            <li><a href="#">Activities</a></li>
                        </ul>
                    </div>
                    <div>
                        <h4>Resources</h4>
                        <ul>
                            <li><a href="#">Support</a></li>
                            <li><a href="#">Help Center</a></li>
                        </ul>
                    </div>
                    <div>
                        <h4>Legal</h4>
                        <ul>
                            <li><a href="#">Privacy Policy</a></li>
                            <li><a href="#">Terms</a></li>
                        </ul>
                    </div>
                </div>
            </div>
            <div class="footer-section footer-social-section">
                <div class="footer-social">
                    <a href="#"><i class="fa-brands fa-facebook"></i></a>
                    <a href="#"><i class="fa-brands fa-square-x-twitter"></i></a>
                    <a href="#"><i class="fa-brands fa-instagram"></i></a>
                    <a href="#"><i class="fa-brands fa-youtube"></i></a>
                </div>
            </div>
        </div>
        <div class="footer-bottom">© 2026 HelpingHands. All rights reserved.</div>
    </footer>

    <script>
        let gameData = {
            num1: 0,
            num2: 0,
            answer: 0,
            selection: null
        };

        function startNewMission() {
            gameData.selection = null;
            document.getElementById('feedback').innerText = "";
            document.getElementById('nextBtn').style.display = "none";
            
            // Randomly choose which number is the multiple of 10
            const swap = Math.random() > 0.5;
            const singleDigit = Math.floor(Math.random() * 8) + 2; // 2-9
            const multipleOfTen = (Math.floor(Math.random() * 9) + 1) * 10; // 10, 20... 90

            if (swap) {
                gameData.num1 = multipleOfTen;
                gameData.num2 = singleDigit;
            } else {
                gameData.num1 = singleDigit;
                gameData.num2 = multipleOfTen;
            }

            gameData.answer = gameData.num1 * gameData.num2;

            document.getElementById('problemText').innerText = `${gameData.num1} × ${gameData.num2} = ?`;

            // Update Visualization using "Base-10 blocks"
            const viz = document.getElementById('arrayViz');
            viz.innerHTML = "";
            
            // Total number of "10s" to display
            const totalTens = gameData.answer / 10;
            
            for(let i=0; i < totalTens; i++) {
                const block = document.createElement('div');
                block.className = 'ten-block';
                // Add 10 segments for visual accuracy
                for(let s=0; s<10; s++) {
                    const segment = document.createElement('div');
                    segment.className = 'ten-block-segment';
                    block.appendChild(segment);
                }
                viz.appendChild(block);
            }

            renderOptions();
        }

        function renderOptions() {
            const container = document.getElementById('options');
            container.innerHTML = "";

            let options = [gameData.answer];
            while (options.length < 4) {
                let distractor;
                const mode = Math.random();
                
                if (mode > 0.7) {
                    // Off by one 10
                    distractor = gameData.answer + (Math.random() > 0.5 ? 10 : -10);
                } else if (mode > 0.4) {
                    // The "forget the zero" mistake
                    distractor = gameData.answer / 10;
                } else {
                    // Random multiple of 10
                    distractor = (Math.floor(Math.random() * 50) + 1) * 10;
                }
                
                if (distractor > 0 && distractor !== gameData.answer && !options.includes(distractor)) {
                    options.push(distractor);
                }
            }
            options.sort((a, b) => a - b);

            options.forEach(val => {
                const card = document.createElement('div');
                card.className = 'choice-card';
                card.innerText = val;
                card.onclick = () => {
                    document.querySelectorAll('.choice-card').forEach(c => c.classList.remove('selected'));
                    card.classList.add('selected');
                    gameData.selection = val;
                };
                container.appendChild(card);
            });
        }

        function checkAnswer() {
            const feedback = document.getElementById('feedback');
            if (gameData.selection === null) {
                feedback.innerText = "Pick a number! 🔢";
                feedback.style.color = "#f39c12";
                return;
            }

            if (gameData.selection === gameData.answer) {
                feedback.innerText = `🌟 Brilliant! ${gameData.num1} × ${gameData.num2} = ${gameData.answer}.`;
                feedback.style.color = "#27ae60";
                document.getElementById('nextBtn').style.display = "block";
                document.getElementById('problemText').innerText = `${gameData.num1} × ${gameData.num2} = ${gameData.answer}`;
            } else {
                feedback.innerText = "❌ Not quite. Remember: Multiply the non-zero numbers and add the zero!";
                feedback.style.color = "#e74c3c";
            }
        }

        window.onload = startNewMission;
    </script>
</body>
</html>
